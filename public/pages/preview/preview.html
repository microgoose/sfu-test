<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="/icons/favicon.ico" type="image/x-icon"/>
    <link rel="stylesheet" href="/css/terminal.css"/>
    <link rel="stylesheet" href="/pages/preview/preview.css"/>
    <title>Preview</title>
</head>
<body>

<main class="page preview-page">
    <section class="terminal-shell">
        <header class="terminal-header">
            <div>
                <h1 class="terminal-title">Preview</h1>
                <div class="terminal-subtitle">
                    Canvas animation is ready for future stream capture.
                </div>
            </div>
        </header>

        <div class="terminal-body preview-layout">
            <div class="preview-stage">
                <canvas
                    id="preview-canvas"
                    class="preview-canvas"
                    width="960"
                    height="540"
                    aria-label="Animated preview canvas"
                ></canvas>
            </div>
            <div class="preview-actions">
                <a id="confirm-button" class="terminal-button" href="/rooms">Confirm</a>
            </div>
        </div>
    </section>
</main>

<script type="module" src="/pages/preview/preview.js"></script>
</body>
</html>
